site_name: Application User Manual
site_description: Auto-generated from UI/UX wireframes, Gherkin features, and Playwright screenshots
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - content.tabs.link
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Features:
    - "Campaign Planning Agent": features/campaign-planning-agent.md
    - "Campaign Timeline — Stage Progression Visualization": features/campaign-timeline-stage-progression-visualization.md
    - "Chat Interface — Split Panel with Streaming": features/chat-interface-split-panel-with-streaming.md
    - "Creative Generation — AI Image, Caption & Hashtag Pipeline": features/creative-generation-ai-image-caption-hashtag-pipeline.md
    - "Data Persistence — Planning Stage": features/data-persistence-planning-stage.md
    - "Observability — Structured Logging for Planner Agent": features/observability-structured-logging-for-planner-agent.md
