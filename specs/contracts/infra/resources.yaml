# specs/contracts/infra/resources.yaml
# Infrastructure contract — Azure resources required by the application
# Auto-generated by contract-generation skill, updated per increment
#
# Source of truth: infra/main.bicep + infra/core/ai/ai-project.bicep
# Validated against actual Bicep definitions on 2026-03-30

version: "1.0"
deployment_target: "Azure Container Apps via Aspire + AZD"
region: "eastus2"

resources:
  # --- Compute ---
  - name: api
    type: Microsoft.App/containerApps
    description: Express.js API backend
    sku: Consumption
    bicep_module: "br/public:avm/ptn/azd/container-app-upsert:0.1.1"
    config:
      cpu: "1.0"
      memory: "2.0Gi"
      minReplicas: 1
      port: 8080
      identityType: UserAssigned
    env_vars:
      - AZURE_CLIENT_ID (from managed identity)
      - AZURE_OPENAI_ENDPOINT (from AI project)
      - APPLICATIONINSIGHTS_CONNECTION_STRING (from App Insights)
      - JWT_SECRET (generated via uniqueString)
    increments: [inc-01, inc-02, inc-03, inc-04, inc-05, inc-06, inc-07]

  - name: web
    type: Microsoft.App/containerApps
    description: Next.js frontend
    sku: Consumption
    bicep_module: "br/public:avm/ptn/azd/container-app-upsert:0.1.1"
    config:
      minReplicas: 1
      port: 3000
      identityType: UserAssigned
    env_vars:
      - NEXT_PUBLIC_API_URL (from API container app URI)
      - HOSTNAME (0.0.0.0 for container binding)
    increments: [inc-01, inc-02, inc-03, inc-04, inc-05, inc-06, inc-07]

  # --- Managed Identities ---
  - name: api-identity
    type: Microsoft.ManagedIdentity/userAssignedIdentities
    description: User-assigned managed identity for API backend
    bicep_module: "br/public:avm/res/managed-identity/user-assigned-identity:0.2.1"
    note: Used for Azure OpenAI access via RBAC (Cognitive Services User role)
    increments: [inc-01]

  - name: web-identity
    type: Microsoft.ManagedIdentity/userAssignedIdentities
    description: User-assigned managed identity for Web frontend
    bicep_module: "br/public:avm/res/managed-identity/user-assigned-identity:0.2.1"
    increments: [inc-01]

  # --- AI Services ---
  - name: ai-account
    type: Microsoft.CognitiveServices/accounts
    description: Azure AI Services account (OpenAI-compatible) for LLM text + image generation
    kind: AIServices
    sku: S0
    bicep_file: "infra/core/ai/ai-project.bicep"
    config:
      disableLocalAuth: true  # Managed identity only — no API keys
      publicNetworkAccess: Enabled
      allowProjectManagement: true
    models:
      - name: gpt-5-4-mini
        model: gpt-5.4-mini
        format: OpenAI
        version: "2025-04-14"
        sku: GlobalStandard
        capacity: 10
        used_by: [planner-agent, creative-generator-caption, creative-generator-hashtags, copy-reviewer, localizer]
        increments: [inc-01, inc-02, inc-03, inc-04, inc-05]
      - name: gpt-image-1-5
        model: gpt-image-1.5
        format: OpenAI
        version: "2025-04-14"
        sku: GlobalStandard
        capacity: 1
        used_by: [creative-generator-image]
        increments: [inc-02, inc-04]
    outputs:
      - AZURE_OPENAI_ENDPOINT
      - AZURE_AI_PROJECT_ENDPOINT
    role_assignments:
      - role: Azure AI Developer (64702f94-c441-49e6-a78b-ef80e0188fee)
        scope: resourceGroup
      - role: Cognitive Services User (a97b65f3-24c7-4388-baec-2e87135dc908)
        scope: resourceGroup
    increments: [inc-01, inc-02, inc-03, inc-04, inc-05]

  - name: ai-project
    type: Microsoft.CognitiveServices/accounts/projects
    description: AI Foundry project for managing deployments and connections
    parent: ai-account
    increments: [inc-01]

  # --- Observability ---
  - name: log-analytics
    type: Microsoft.OperationalInsights/workspaces
    description: Log Analytics workspace for monitoring and Container Apps logs
    sku: PerGB2018
    bicep_file: "infra/core/monitor/loganalytics.bicep"
    config:
      retentionDays: 30
    increments: [inc-01, inc-07]

  - name: app-insights
    type: Microsoft.Insights/components
    description: Application Insights for distributed tracing and application monitoring
    bicep_file: "infra/core/monitor/applicationinsights.bicep"
    depends_on: [log-analytics]
    outputs:
      - APPLICATIONINSIGHTS_CONNECTION_STRING
    increments: [inc-01, inc-07]

  # --- Container Registry ---
  - name: container-registry
    type: Microsoft.ContainerRegistry/registries
    description: Azure Container Registry for Docker images
    sku: Basic
    bicep_module: "br/public:avm/ptn/azd/container-apps-stack:0.1.0"
    config:
      adminUserEnabled: true
    outputs:
      - AZURE_CONTAINER_REGISTRY_ENDPOINT
      - AZURE_CONTAINER_REGISTRY_NAME
    increments: [inc-01]

  # --- Container Apps Environment ---
  - name: container-apps-env
    type: Microsoft.App/managedEnvironments
    description: Container Apps shared environment with Log Analytics integration
    bicep_module: "br/public:avm/ptn/azd/container-apps-stack:0.1.0"
    config:
      zoneRedundant: false
    depends_on: [log-analytics, app-insights, container-registry]
    outputs:
      - AZURE_CONTAINER_ENVIRONMENT_NAME
    increments: [inc-01]

  # --- Future (inc-06) ---
  # - name: database
  #   type: SQLite (local file, no Azure resource)
  #   description: Campaign persistence — ephemeral in Container Apps
  #   path: data/campaign.db
  #   note: Acceptable for single-user demo. Production would use Azure Database for PostgreSQL.
  #   increments: [inc-06]
